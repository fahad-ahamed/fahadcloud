# ============================================================
# FahadCloud Log Rotation Configuration
# Install: sudo cp logrotate.conf /etc/logrotate.d/fahadcloud
# ============================================================

# Application logs (PM2 output)
/home/fahad/fahadcloud/logs/*.log {
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    maxsize 50M
    minsize 1M
    dateext
    dateformat -%Y%m%d
    create 0644 fahad fahad
    sharedscripts
    postrotate
        # Signal PM2 to reopen log files if running
        if command -v pm2 &>/dev/null; then
            pm2 reloadLogs 2>/dev/null || true
        fi
    endscript
}

# Backup logs
/home/fahad/fahadcloud/logs/db-backup.log
/home/fahad/fahadcloud/logs/ssl-renew.log {
    weekly
    rotate 8
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    maxsize 10M
    dateext
    dateformat -%Y%m%d
    create 0644 fahad fahad
}

# Nginx logs for FahadCloud
/var/log/nginx/fahadcloud.*.log {
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    sharedscripts
    prerotate
        if [ -d /etc/logrotate.d/httpd-prerotate ]; then \
            run-parts /etc/logrotate.d/httpd-prerotate; \
        fi
    endscript
    postrotate
        invoke-rc.d nginx rotate >/dev/null 2>&1 || true
    endscript
    maxsize 100M
}
