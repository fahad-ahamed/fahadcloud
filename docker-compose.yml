# ============================================================
# FahadCloud Docker Compose — Production Stack v7.0
# ============================================================

services:
  # ---------- Next.js Application ----------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fahadcloud-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://fahadcloud:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/fahadcloud
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - UV_THREADPOOL_SIZE=16
      - NODE_OPTIONS=--max-old-space-size=768 --optimize-for-size
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - fahadcloud-internal
    volumes:
      - app-logs:/app/logs
      - app-uploads:/app/hosting
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------- PostgreSQL Database ----------
  postgres:
    image: postgres:16-alpine
    container_name: fahadcloud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fahadcloud
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: fahadcloud
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=4MB
      -c maintenance_work_mem=128MB
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c max_connections=100
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c max_worker_processes=4
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - fahadcloud-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fahadcloud -d fahadcloud"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ---------- Redis Cache & Queue ----------
  redis:
    image: redis:7-alpine
    container_name: fahadcloud-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --rename-command FLUSHDB ""
      --rename-command FLUSHALL ""
      --rename-command DEBUG ""
    volumes:
      - redis-data:/data
    networks:
      - fahadcloud-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 640M
          cpus: "1.0"
        reservations:
          memory: 64M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------- Qdrant Vector Database ----------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: fahadcloud-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - fahadcloud-internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ============================================================
# Named Volumes — Persistent Data
# ============================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  qdrant-data:
    driver: local
  app-logs:
    driver: local
  app-uploads:
    driver: local

# ============================================================
# Isolated Network
# ============================================================
networks:
  fahadcloud-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
