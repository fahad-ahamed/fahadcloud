# ============================================================
# FahadCloud Docker Compose — Production Stack
# ============================================================
version: "3.9"

services:
  # ---------- Next.js Application ----------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fahadcloud-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://fahadcloud:${POSTGRES_PASSWORD:-changeme}@postgres:5432/fahadcloud
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fahadcloud-internal
    volumes:
      - app-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ---------- PostgreSQL Database ----------
  postgres:
    image: postgres:16-alpine
    container_name: fahadcloud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fahadcloud
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: fahadcloud
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - fahadcloud-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fahadcloud -d fahadcloud"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ---------- Redis Cache & Queue ----------
  redis:
    image: redis:7-alpine
    container_name: fahadcloud-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - fahadcloud-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      start_period: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 320M
        reservations:
          memory: 64M

  # ---------- Qdrant Vector Database ----------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: fahadcloud-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - fahadcloud-internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

# ============================================================
# Named Volumes — Persistent Data
# ============================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  qdrant-data:
    driver: local
  app-logs:
    driver: local

# ============================================================
# Isolated Network
# ============================================================
networks:
  fahadcloud-internal:
    driver: bridge
