# ============================================================
# FahadCloud — Nginx Production Reverse Proxy Configuration
# ============================================================
# Place at /etc/nginx/sites-available/fahadcloud
# Symlink to /etc/nginx/sites-enabled/fahadcloud
# ============================================================

# Rate Limiting Zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/m;

# Upstream to Next.js Application
upstream fahadcloud_app {
    server 127.0.0.1:3000 fail_timeout=10s max_fails=3;
    keepalive 64;
}

# ============================================================
# HTTP → HTTPS Redirect
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name fahadcloud.com www.fahadcloud.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# HTTPS — Main Server Block
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fahadcloud.com www.fahadcloud.com;

    # ----- SSL / TLS Configuration -----
    ssl_certificate     /etc/letsencrypt/live/fahadcloud.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fahadcloud.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/fahadcloud.com/chain.pem;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # SSL Session Cache
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ----- Security Headers -----
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https: wss:; frame-ancestors 'self';" always;

    # ----- Logging -----
    access_log /var/log/nginx/fahadcloud.access.log;
    error_log  /var/log/nginx/fahadcloud.error.log warn;

    # ----- Gzip Compression -----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/opentype
        font/ttf
        font/woff
        font/woff2;

    # ----- Proxy Buffers -----
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # ----- Client Body (uploads) -----
    client_max_body_size 50m;
    client_body_buffer_size 128k;
    client_body_timeout 30s;

    # ----- Static File Caching -----
    location /_next/static/ {
        proxy_pass http://fahadcloud_app;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /static/ {
        proxy_pass http://fahadcloud_app;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif|woff|woff2|ttf|eot|css|js)$ {
        proxy_pass http://fahadcloud_app;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ----- API Rate Limiting -----
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://fahadcloud_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/upload {
        limit_req zone=upload burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://fahadcloud_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://fahadcloud_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ----- WebSocket Support -----
    location /ws/ {
        proxy_pass http://fahadcloud_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ----- General Rate Limiting & Proxy -----
    location / {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://fahadcloud_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ----- Block Sensitive Files -----
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    location ~ \.(env|git|gitignore|md|log)$ {
        deny all;
        return 404;
    }

    # ----- Health Check Endpoint (no rate limit) -----
    location /api/health {
        proxy_pass http://fahadcloud_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}
